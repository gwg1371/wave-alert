name: Wave Alert

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 Israel (UTC+2) / 09:00 DST (UTC+3)
  workflow_dispatch:        # allow manual runs for testing
    inputs:
      force:
        description: "Send alert even if today is not a surf day"
        type: boolean
        default: false

jobs:
  check-waves:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit history.json updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run wave checker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_WAVE_HEIGHT: ${{ vars.MIN_WAVE_HEIGHT }}
          MIN_SCORE: ${{ vars.MIN_SCORE }}
          CHECK_DAYS: ${{ vars.CHECK_DAYS }}
        run: python wave_checker.py --mode today ${{ github.event_name == 'workflow_dispatch' && inputs.force && '--force' || '' }}

      - name: Commit history log
        run: |
          git config user.name "Wave Alert Bot"
          git config user.email "wave-alert-bot@users.noreply.github.com"
          git add history.json || true
          git diff --cached --quiet || git commit -m "bot: update history log [skip ci]"
          git diff origin/main..HEAD --quiet || git push
