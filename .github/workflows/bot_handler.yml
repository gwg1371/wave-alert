name: Bot Command Handler

on:
  schedule:
    - cron: "*/10 * * * *"   # poll Telegram every 10 minutes
  workflow_dispatch:           # allow manual trigger for testing

jobs:
  handle-commands:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # needed to commit config.json updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Handle Telegram commands
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORLDTIDES_KEY: ${{ secrets.WORLDTIDES_KEY }}
        run: python bot_handler.py
